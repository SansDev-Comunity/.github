    <path d="M1634 285V370L1764 435V345Z" fill="#0f2253" stroke="#1d8bff" stroke-width="2"></path>
    <path d="M1894 285V370L1764 435V345Z" fill="#1d4ed8" fill-opacity=".26" stroke="#1d8bff" stroke-width="2"></path>
    <rect x="1706" y="270" width="132" height="88" rx="10" fill="#020617" stroke="#22d3ee" stroke-width="4"></rect>
    <line x1="1724" y1="294" x2="1810" y2="294" stroke="#22d3ee" stroke-width="5" stroke-linecap="round"></line>
    <line x1="1724" y1="317" x2="1788" y2="317" stroke="#38bdf8" stroke-width="4" stroke-linecap="round"></line>
    <line x1="1724" y1="338" x2="1820" y2="338" stroke="#a855f7" stroke-width="4" stroke-linecap="round"></line>
    <ellipse cx="1858" cy="421" rx="66" ry="28" fill="#7c3aed"></ellipse>
    <rect x="1792" y="421" width="132" height="91" fill="#5b21b6"></rect>
    <ellipse cx="1858" cy="512" rx="66" ry="28" fill="#4c1d95"></ellipse>
    <path d="M1792 452C1826 473 1890 473 1924 452" stroke="#c084fc" stroke-width="2"></path>
    <path d="M1792 488C1826 509 1890 509 1924 488" stroke="#c084fc" stroke-width="2"></path>
  </g>

  <g class="float glow-cyan">
    <path d="M1666 397L1735 426V481C1735 528 1704 558 1666 574C1628 558 1597 528 1597 481V426L1666 397Z" fill="#0ea5e9"></path>
    <path d="M1666 420L1700 435V477C1700 501 1683 519 1666 530C1649 519 1632 501 1632 477V435L1666 420Z" fill="#f8fafc"></path>
    <path d="M1648 476V455C1648 440 1656 430 1668 430C1680 430 1688 440 1688 455V476" stroke="#020617" stroke-width="8"></path>
    <rect x="1644" y="468" width="48" height="38" rx="6" fill="#020617"></rect>
  </g>

  <text x="1024" y="228" text-anchor="middle" class="title">
    <tspan class="cyan">SAN</tspan>
    <tspan class="white" dx="28">Global Digital</tspan>
  </text>

  <text x="1024" y="318" text-anchor="middle" class="subtitle">
    Building Digital Community &amp; Infrastructure
  </text>

  <g>
