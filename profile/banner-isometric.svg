<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020617"></stop>
      <stop offset="0.45" stop-color="#082f49"></stop>
      <stop offset="1" stop-color="#0f172a"></stop>
    </linearGradient>

    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#22d3ee"></stop>
      <stop offset="1" stop-color="#3b82f6"></stop>
    </linearGradient>

    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#a855f7"></stop>
      <stop offset="1" stop-color="#6366f1"></stop>
    </linearGradient>

    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#22c55e"></stop>
      <stop offset="1" stop-color="#14b8a6"></stop>
    </linearGradient>

    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="7" result="blur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3" result="blur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>

    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="#38bdf8" stroke-width="0.5" opacity="0.16"></path>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="360" rx="18" fill="url(#bg)"></rect>
  <rect width="1200" height="360" rx="18" fill="url(#grid)" opacity="0.5"></rect>

  <!-- Ambient glow -->
  <circle cx="185" cy="95" r="130" fill="#0ea5e9" opacity="0.13" filter="url(#glow)"></circle>
  <circle cx="1010" cy="260" r="150" fill="#7c3aed" opacity="0.15" filter="url(#glow)"></circle>
  <ellipse cx="600" cy="330" rx="420" ry="35" fill="#38bdf8" opacity="0.08"></ellipse>

  <!-- Decorative network lines -->
  <g stroke="#38bdf8" stroke-width="1.4" opacity="0.35">
    <path d="M75 90 L150 130 L230 85 L310 145 L410 115"></path>
    <path d="M800 82 L900 120 L970 75 L1070 135 L1140 95"></path>
    <path d="M120 285 L250 245 L380 270 L500 230"></path>
    <path d="M720 245 L850 270 L960 235 L1100 275"></path>
  </g>

  <g fill="#38bdf8" filter="url(#softGlow)">
    <circle cx="75" cy="90" r="3"></circle>
    <circle cx="150" cy="130" r="3"></circle>
    <circle cx="230" cy="85" r="4"></circle>
    <circle cx="310" cy="145" r="3"></circle>
    <circle cx="410" cy="115" r="3"></circle>
    <circle cx="900" cy="120" r="3"></circle>
    <circle cx="970" cy="75" r="4"></circle>
    <circle cx="1070" cy="135" r="3"></circle>
    <circle cx="1140" cy="95" r="3"></circle>
  </g>

  <!-- Left server 1 -->
  <g transform="translate(82 160)">
    <polygon points="0,42 36,22 72,42 36,62" fill="#164e63"></polygon>
    <polygon points="0,42 0,122 36,144 36,62" fill="#0f2a44"></polygon>
    <polygon points="72,42 72,122 36,144 36,62" fill="#1e3a8a"></polygon>
    <polygon points="10,44 36,30 62,44 36,58" fill="url(#cyan)" filter="url(#softGlow)"></polygon>

    <rect x="17" y="74" width="38" height="8" rx="3" fill="#bae6fd"></rect>
    <rect x="17" y="92" width="38" height="8" rx="3" fill="#bae6fd"></rect>
    <rect x="17" y="110" width="24" height="8" rx="3" fill="#bae6fd"></rect>
    <circle cx="52" cy="114" r="4" fill="#22d3ee"></circle>
  </g>

  <!-- Left server 2 -->
  <g transform="translate(170 115)">
    <polygon points="0,42 36,22 72,42 36,62" fill="#312e81"></polygon>
    <polygon points="0,42 0,155 36,177 36,62" fill="#1e1b4b"></polygon>
    <polygon points="72,42 72,155 36,177 36,62" fill="#3730a3"></polygon>
    <polygon points="10,44 36,30 62,44 36,58" fill="url(#purple)" filter="url(#softGlow)"></polygon>

    <rect x="17" y="76" width="38" height="8" rx="3" fill="#ddd6fe"></rect>
    <rect x="17" y="94" width="38" height="8" rx="3" fill="#ddd6fe"></rect>
    <rect x="17" y="112" width="38" height="8" rx="3" fill="#ddd6fe"></rect>
    <rect x="17" y="130" width="26" height="8" rx="3" fill="#ddd6fe"></rect>
    <circle cx="52" cy="134" r="4" fill="#a78bfa"></circle>
  </g>

  <!-- Cloud icon -->
  <g transform="translate(115 275)" filter="url(#softGlow)">
    <ellipse cx="35" cy="24" rx="20" ry="15" fill="#38bdf8"></ellipse>
    <ellipse cx="56" cy="21" rx="18" ry="13" fill="#38bdf8"></ellipse>
    <ellipse cx="22" cy="29" rx="15" ry="11" fill="#38bdf8"></ellipse>
    <rect x="18" y="24" width="52" height="19" rx="10" fill="#38bdf8"></rect>
    <path d="M44 48V67" stroke="#e0f2fe" stroke-width="4" stroke-linecap="round"></path>
    <path d="M33 58L44 69L55 58" stroke="#e0f2fe" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"></path>
  </g>

  <!-- Right laptop -->
  <g transform="translate(930 112)">
    <polygon points="0,36 48,10 96,36 48,62" fill="#164e63"></polygon>
    <polygon points="0,36 0,95 48,121 48,62" fill="#0f2a44"></polygon>
    <polygon points="96,36 96,95 48,121 48,62" fill="#1e40af"></polygon>
    <rect x="21" y="35" width="54" height="40" rx="5" fill="#dbeafe" stroke="#22d3ee" stroke-width="2"></rect>
    <polygon points="-10,124 48,96 106,124 48,152" fill="#1e3a8a"></polygon>
    <rect x="22" y="116" width="52" height="6" rx="3" fill="#e0f2fe"></rect>
  </g>

  <!-- Security shield -->
  <g transform="translate(1020 210)" filter="url(#softGlow)">
    <path d="M46 0L86 18V52C86 80 66 104 46 114C26 104 6 80 6 52V18L46 0Z" fill="url(#cyan)"></path>
    <path d="M46 18L64 26V49C64 64 55 78 46 84C37 78 28 64 28 49V26L46 18Z" fill="#e0f2fe"></path>
    <path d="M39 52L44 57L55 44" stroke="#0f172a" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"></path>
  </g>

  <!-- Database -->
  <g transform="translate(1085 275)">
    <ellipse cx="0" cy="0" rx="30" ry="12" fill="#8b5cf6" filter="url(#softGlow)"></ellipse>
    <rect x="-30" y="0" width="60" height="42" fill="#6d28d9"></rect>
    <ellipse cx="0" cy="42" rx="30" ry="12" fill="#4c1d95"></ellipse>
    <path d="M-30 14C-12 25 12 25 30 14" stroke="#ddd6fe" opacity="0.7"></path>
    <path d="M-30 28C-12 39 12 39 30 28" stroke="#ddd6fe" opacity="0.7"></path>
  </g>

  <!-- Connection lines center -->
  <g stroke="#38bdf8" stroke-width="2" opacity="0.55">
    <path d="M230 245 C330 220, 390 225, 470 195"></path>
    <path d="M735 195 C825 220, 910 225, 1005 245"></path>
    <path d="M220 295 C340 275, 420 260, 510 220"></path>
    <path d="M700 225 C810 250, 940 260, 1085 275"></path>
  </g>

  <g fill="#22d3ee" filter="url(#softGlow)">
    <circle cx="300" cy="230" r="4"></circle>
    <circle cx="390" cy="222" r="3"></circle>
    <circle cx="470" cy="195" r="4"></circle>
    <circle cx="735" cy="195" r="4"></circle>
    <circle cx="825" cy="220" r="3"></circle>
    <circle cx="910" cy="225" r="4"></circle>
  </g>

  <!-- Main title -->
  <text x="600" y="145" text-anchor="middle" fill="#f8fafc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="58" font-weight="800">
    SAN Global Digital
  </text>

  <!-- Subtitle -->
  <text x="600" y="190" text-anchor="middle" fill="#22d3ee" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="25" font-weight="700">
    Building Digital Community &amp; Infrastructure
  </text>

  <!-- Feature labels -->
  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" fill="#e0f2fe">
    <text x="380" y="280">☊ Network</text>
    <text x="500" y="280">☁ Cloud</text>
    <text x="615" y="280">🛡 Security</text>
    <text x="750" y="280">◎ Community</text>
  </g>

  <!-- Border -->
  <rect x="1" y="1" width="1198" height="358" rx="18" stroke="#38bdf8" stroke-opacity="0.28" stroke-width="2"></rect>
</svg>