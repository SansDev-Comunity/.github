<svg width="2048" height="614" viewBox="0 0 2048 614" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title {
      font: 900 94px 'Segoe UI', Arial, sans-serif;
      letter-spacing: -2px;
    }

    .subtitle {
      font: 800 44px 'Segoe UI', Arial, sans-serif;
      fill: #22d3ee;
    }

    .feature {
      font: 600 32px 'Segoe UI', Arial, sans-serif;
      fill: #f8fafc;
    }

    .pill {
      font: 800 30px 'Segoe UI', Arial, sans-serif;
      fill: #f8fafc;
      letter-spacing: 2px;
    }

    .cyan { fill: #22d3ee; }
    .white { fill: #f8fafc; }

    .glow-cyan {
      filter: drop-shadow(0 0 8px #22d3ee)
              drop-shadow(0 0 20px rgba(34, 211, 238, .75));
    }

    .glow-purple {
      filter: drop-shadow(0 0 8px #a855f7)
              drop-shadow(0 0 20px rgba(168, 85, 247, .7));
    }

    .float {
      animation: float 4s ease-in-out infinite;
      transform-origin: center;
    }

    .float-alt {
      animation: floatAlt 4.8s ease-in-out infinite;
      transform-origin: center;
    }

    .pulse {
      animation: pulse 2.4s ease-in-out infinite;
    }

    .line-flow {
      stroke-dasharray: 520;
      stroke-dashoffset: 520;
      animation: flow 5s linear infinite;
    }

    .icon-move {
      animation: iconMove 3.2s ease-in-out infinite;
      transform-origin: center;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @keyframes floatAlt {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(8px); }
    }

    @keyframes pulse {
      0%, 100% { opacity: .45; }
      50% { opacity: 1; }
    }

    @keyframes flow {
      to { stroke-dashoffset: -520; }
    }

    @keyframes iconMove {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-7px); }
    }
  </style>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="2048" y2="614">
      <stop offset="0%" stop-color="#020617"></stop>
      <stop offset="48%" stop-color="#071832"></stop>
      <stop offset="100%" stop-color="#020617"></stop>
    </linearGradient>

    <linearGradient id="lineGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"></stop>
      <stop offset="52%" stop-color="#2563eb"></stop>
      <stop offset="100%" stop-color="#a855f7"></stop>
    </linearGradient>

    <pattern id="grid" width="46" height="46" patternUnits="userSpaceOnUse">
      <path d="M46 0H0V46" stroke="#2563eb" stroke-opacity=".08" stroke-width="1"></path>
    </pattern>
  </defs>

  <rect width="2048" height="614" rx="42" fill="url(#bg)"></rect>
  <rect width="2048" height="614" rx="42" fill="url(#grid)"></rect>
  <rect x="3" y="3" width="2042" height="608" rx="40" stroke="#2563eb" stroke-width="5" opacity=".9"></rect>

  <path class="line-flow glow-cyan" d="M70 142H280L360 66H665L725 113H880L930 156H1185L1245 113H1380L1422 82H1585" stroke="url(#lineGradient)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"></path>
  <path class="line-flow glow-purple" d="M1230 88H1490L1592 184H1815L1935 96" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round" opacity=".58"></path>
  <path class="line-flow glow-cyan" d="M460 377H900L930 347H1325L1368 377H1585" stroke="url(#lineGradient)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"></path>

