      <path d="M1348 414H1360M1348 427H1360M1348 440H1360M1400 414H1412M1400 427H1412M1400 440H1412" stroke="#93c5fd" stroke-width="3" stroke-linecap="round"></path>
    </g>
    <text x="1380" y="497" text-anchor="middle" class="feature">Technology</text>

    <line x1="738" y1="438" x2="738" y2="502" stroke="#2563eb" stroke-width="2" opacity=".7"></line>
    <line x1="992" y1="438" x2="992" y2="502" stroke="#2563eb" stroke-width="2" opacity=".7"></line>
    <line x1="1249" y1="438" x2="1249" y2="502" stroke="#2563eb" stroke-width="2" opacity=".7"></line>
  </g>

  <rect x="670" y="526" width="708" height="64" rx="32" fill="#020617" stroke="#2563eb" stroke-width="3"></rect>
  <text x="1024" y="567" text-anchor="middle" class="pill">
    INDONESIA <tspan fill="#a855f7">•</tspan> OPEN SOURCE COMMUNITY
