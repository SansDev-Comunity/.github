    <path d="M147 292V454L256 512V346Z" fill="#0f2253" stroke="#1d8bff" stroke-width="2"></path>
    <path d="M365 292V454L256 512V346Z" fill="#1d4ed8" fill-opacity=".26" stroke="#1d8bff" stroke-width="2"></path>
    <rect x="203" y="336" width="103" height="22" rx="5" fill="#22d3ee"></rect>
    <rect x="203" y="385" width="103" height="22" rx="5" fill="#38bdf8"></rect>
    <rect x="203" y="432" width="103" height="22" rx="5" fill="#22d3ee"></rect>
    <ellipse cx="332" cy="451" rx="75" ry="34" fill="#0ea5e9"></ellipse>
    <circle cx="298" cy="441" r="36" fill="#22d3ee" opacity=".72"></circle>
    <circle cx="361" cy="432" r="36" fill="#0ea5e9"></circle>
  </g>

  <g class="float-alt glow-purple">
